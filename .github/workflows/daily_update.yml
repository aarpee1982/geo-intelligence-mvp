name: Daily GEO Update

on:
  workflow_dispatch:
  schedule:
    - cron: '15 3 * * *'   # 03:15 UTC daily

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch candidate sources from RSS feeds
        run: python scripts/fetch_updates.py

      - name: Synthesize candidate best practices
        run: python scripts/synthesize_best_practices.py

      - name: Rebuild Excel workbook export
        run: python scripts/rebuild_excel.py

      - name: Commit refreshed data and exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ exports/
          git diff --cached --quiet || git commit -m "chore: auto-refresh GEO intelligence data [skip ci]"
          git push
